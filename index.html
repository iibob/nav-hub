<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的第一个 Cloudflare Pages 网站</title>
    <style>
        body {
            display: flex;
            justify-content: center;

            height: 100vh;

<body>
    <div class="container">
        <h1>你好，世界！</h1>

</html>
